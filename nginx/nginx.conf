worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Rate limiting zone: 10 req/s per IP, 10MB shared memory
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # Audio files can be up to ~30s at acceptable quality (~6MB); 50MB is safe headroom
        client_max_body_size 50M;

        # Voice call processing can take time; prevent premature timeout
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Health check: no rate limiting so uptime monitors don't get throttled
        location /health {
            proxy_pass http://backend;
        }

        # API: rate limited with burst allowance for legitimate spikes
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
        }

        # Metrics: Prometheus scrapes backend:8000 directly on the internal network.
        # Block public access entirely.
        location /metrics {
            deny all;
            return 403;
        }

        location / {
            proxy_pass http://backend;
        }
    }
}
